<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Galaxy Love</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@400;500;600&display=swap');

  :root{
    --bg-deep:#0a0509;
    --wine-2:#170208;
    --crimson:#ff2350;
    --rose:#ff5c85;
    --gold:#ffd9a0;
    --cream:#f6e9ec;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg-deep);
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    color:var(--cream);
  }

  #stage{
    position:relative;
    width:100%; height:100%;
    min-height:560px;
    background:
      radial-gradient(ellipse 70% 40% at 50% 10%, rgba(255,45,90,.22), transparent 65%),
      radial-gradient(ellipse 90% 60% at 50% 105%, rgba(255,45,90,.14), transparent 60%),
      linear-gradient(180deg, var(--wine-2), var(--bg-deep) 60%);
  }

  /* vignette, cheap static layer */
  #vignette{
    position:absolute; inset:0; pointer-events:none; z-index:2;
    box-shadow: inset 0 0 18vw rgba(0,0,0,.65);
  }

  /* ---------- ambient floating hearts (light) ---------- */
  #hearts{ position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:1; }
  .drift{
    position:absolute; bottom:-10%;
    color: rgba(255,120,160,.5);
    font-size: 13px;
    line-height:1;
    animation: rise linear infinite;
    will-change: transform, opacity;
    transform: translateZ(0);
  }
  @keyframes rise{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    12%{ opacity:1; }
    100%{ transform:translateY(-110vh) rotate(20deg); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .drift{ animation:none; display:none; }
  }

  /* ---------- start screen ---------- */
  #start{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    transition:opacity .7s ease, transform .7s ease;
    z-index:5;
  }
  #start.hidden{ opacity:0; transform:scale(1.05); pointer-events:none; }

  .card{
    position:relative;
    width:min(88%, 350px);
    padding:40px 26px 32px;
    border-radius:24px;
    text-align:center;
    background:linear-gradient(165deg, rgba(60,10,24,.88), rgba(12,3,6,.94));
    border:1px solid rgba(255,140,170,.16);
    box-shadow:0 30px 70px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.02) inset;
    backdrop-filter: blur(2px);
  }

  .card::before{
    content:"";
    position:absolute; inset:-1px;
    border-radius:24px;
    padding:1px;
    background:linear-gradient(160deg, rgba(255,110,150,.35), transparent 40%, transparent 60%, rgba(255,110,150,.2));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events:none;
  }

  .eyebrow{
    font-size:10px; letter-spacing:4px; text-transform:uppercase;
    color:var(--rose); opacity:.8; margin-bottom:10px;
  }

  .card h1{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:600;
    font-size:2.15rem;
    margin:0 0 20px;
    color:var(--cream);
    letter-spacing:.2px;
  }

  .duo{ font-size:42px; margin-bottom:8px; line-height:1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.4)); }
  .tag{
    letter-spacing:3px; font-size:10.5px; color:rgba(246,233,236,.5);
    margin:12px 0 24px; text-transform:uppercase;
  }

  .btn{
    appearance:none; border:none; cursor:pointer;
    padding:14px 44px;
    border-radius:999px;
    font-family:'Poppins',sans-serif;
    font-weight:600; font-size:12.5px; letter-spacing:1.6px;
    color:#fff; touch-action:manipulation;
    background:linear-gradient(120deg, var(--crimson), #ff5480);
    box-shadow:0 10px 24px rgba(255,35,80,.32);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:active{ transform:scale(.97); box-shadow:0 6px 16px rgba(255,35,80,.4); }

  /* ---------- galaxy scene ---------- */
  #scene{
    position:absolute; inset:0;
    opacity:0; pointer-events:none;
    transition:opacity .9s ease;
    z-index:3;
  }
  #scene.show{ opacity:1; pointer-events:auto; }

  #galaxy-canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  .orbit{
    position:absolute; left:50%; top:58%;
    width:1px; height:1px;
    animation-name:spin; animation-timing-function:linear; animation-iteration-count:infinite;
    will-change:transform;
  }
  @keyframes spin{ from{ transform:translate(-50%,-50%) rotate(0deg); } to{ transform:translate(-50%,-50%) rotate(360deg); } }

  .orbit span{
    position:absolute;
    white-space:nowrap;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:600;
    color:rgba(255,220,228,.9);
    text-shadow:0 0 8px rgba(255,90,130,.45);
    letter-spacing:.6px;
  }

  #back-btn{
    position:absolute; top:max(18px, env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    z-index:6; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.16);
    color:var(--cream); padding:9px 22px; border-radius:999px; font-size:10.5px;
    letter-spacing:1.6px; cursor:pointer; font-family:'Poppins',sans-serif; touch-action:manipulation;
  }

  .scene-title{
    position:absolute; top:11%; left:50%; transform:translateX(-50%);
    font-family:'Playfair Display', serif; font-style:italic; font-weight:600;
    font-size:1.35rem; color:var(--cream); text-shadow:0 0 16px rgba(255,90,130,.45);
    text-align:center; z-index:4;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="hearts"></div>
  <div id="vignette"></div>

  <!-- SCREEN 1 -->
  <div id="start">
    <div class="card">
      <div class="eyebrow">Para a Minha Nebulosa</div>
      <h1>Galaxy Love</h1>
      <div class="duo">💫 ❤ 💫</div>
      <div class="tag">Eu te Amo Muito</div>
      <button class="btn" id="go">Iniciar</button>
    </div>
  </div>

  <!-- SCREEN 2 -->
  <div id="scene">
    <button id="back-btn">voltar</button>
    <div class="scene-title">infinito &#8734;</div>
    <canvas id="galaxy-canvas"></canvas>
    <div id="orbits"></div>
  </div>
</div>

<script>
/* ---------------- ambient floating hearts (fewer, cheap) ---------------- */
const heartsEl = document.getElementById('hearts');
const glyphs = ['❤','♥'];
const HEART_COUNT = window.innerWidth < 500 ? 10 : 16;
for(let i=0;i<HEART_COUNT;i++){
  const d = document.createElement('div');
  d.className='drift';
  d.textContent = glyphs[i % glyphs.length];
  d.style.left = Math.random()*100+'%';
  d.style.fontSize = (10+Math.random()*14)+'px';
  d.style.animationDuration = (10+Math.random()*9)+'s';
  d.style.animationDelay = (Math.random()*10)+'s';
  heartsEl.appendChild(d);
}

/* ---------------- screen transition ---------------- */
const startEl = document.getElementById('start');
const sceneEl = document.getElementById('scene');
let running = false;
document.getElementById('go').addEventListener('click', ()=>{
  startEl.classList.add('hidden');
  setTimeout(()=>{ sceneEl.classList.add('show'); running = true; }, 220);
});
document.getElementById('back-btn').addEventListener('click', ()=>{
  sceneEl.classList.remove('show');
  running = false;
  setTimeout(()=> startEl.classList.remove('hidden'), 220);
});

/* ---------------- orbiting love phrases (with depth) ---------------- */
const phrases = [
    {text:'Minha Loirinha', radius:78, dur:12, size:11, dir:-1, op:.55},
    {text:'Eu te Amo', radius:112, dur:16, size:13.5, dir:1, op:.75},
    {text:'Casa comigo?', radius:152, dur:22, size:14.5, dir:-1, op:.9},
    {text:'amor eterno', radius:190, dur:28, size:12.5, dir:1, op:.65},
    {text:'amor de mi vida', radius:226, dur:34, size:12, dir:-1, op:.5},
];
const orbitsWrap = document.getElementById('orbits');
phrases.forEach(p=>{
  const orbit = document.createElement('div');
  orbit.className='orbit';
  orbit.style.animationDuration = p.dur+'s';
  orbit.style.animationDirection = p.dir>0 ? 'normal':'reverse';

  const span = document.createElement('span');
  span.textContent = p.text;
  span.style.fontSize = p.size+'px';
  span.style.left = p.radius+'px';
  span.style.top = '0px';
  span.style.opacity = p.op;
  orbit.appendChild(span);
  orbitsWrap.appendChild(orbit);
});

/* ---------------- canvas: particle heart + spiral galaxy (optimized) ---------------- */
const canvas = document.getElementById('galaxy-canvas');
const ctx = canvas.getContext('2d', { alpha:true });
let W,H,cx,cy,DPR;

function makeGlowSprite(rgb, size){
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  grad.addColorStop(0, `rgba(${rgb},1)`);
  grad.addColorStop(.4, `rgba(${rgb},.55)`);
  grad.addColorStop(1, `rgba(${rgb},0)`);
  g.fillStyle = grad;
  g.beginPath(); g.arc(size/2,size/2,size/2,0,Math.PI*2); g.fill();
  return c;
}
const spriteRose = makeGlowSprite('255,70,110', 64);
const spriteGold = makeGlowSprite('255,225,190', 96);

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 1.5);
  W = canvas.width = canvas.clientWidth * DPR;
  H = canvas.height = canvas.clientHeight * DPR;
  cx = W/2; cy = H*0.58;
}
window.addEventListener('resize', resize);

function heartPoint(t){
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return { x, y: -y };
}

const isSmall = window.innerWidth < 500;
const HEART_N = isSmall ? 90 : 140;
const SPIRAL_N = isSmall ? 220 : 340;

const heartParticles = [];
for(let i=0;i<HEART_N;i++){
  const t = Math.random()*Math.PI*2;
  const p = heartPoint(t);
  heartParticles.push({
    bx:p.x, by:p.y,
    jx:(Math.random()-0.5)*5, jy:(Math.random()-0.5)*5,
    size: 5+Math.random()*7,
    tw: Math.random()*Math.PI*2,
    speed: 1.2+Math.random()*1.4
  });
}

const spiralParticles = [];
const ARMS = 3;
for(let i=0;i<SPIRAL_N;i++){
  const arm = i % ARMS;
  const t = Math.random()*4.2 + 0.15;
  spiralParticles.push({
    r: t*26,
    angle0: t*2.1 + arm*(Math.PI*2/ARMS),
    speed: 0.15/(0.4+t*0.35),
    size: Math.max(3, 8 - t*1.2),
    tw: Math.random()*Math.PI*2
  });
}

let last = 0;
let heartPulse = 0;
const FRAME_MS = 1000/45; // cap ~45fps, plenty smooth, lighter on battery

function draw(time){
  if(!running){ requestAnimationFrame(draw); return; }
  if(time - last < FRAME_MS){ requestAnimationFrame(draw); return; }
  last = time;

  ctx.clearRect(0,0,W,H);
  const unit = Math.min(W,H)/34;

  ctx.globalCompositeOperation = 'lighter';

  /* spiral galaxy */
  ctx.save();
  ctx.translate(cx, cy);
  for(const p of spiralParticles){
    const ang = p.angle0 + time*0.00035*p.speed*40;
    const x = Math.cos(ang)*p.r*unit*0.32;
    const y = Math.sin(ang)*p.r*unit*0.11 - 8*DPR;
    const flick = 0.5+0.5*Math.sin(time*0.0016+p.tw);
    const s = p.size*DPR*(0.7+flick*0.5);
    ctx.globalAlpha = 0.35+0.5*flick;
    ctx.drawImage(spriteRose, x-s/2, y-s/2, s, s);
  }
  ctx.globalAlpha = 1;

  /* bright core */
  const coreS = 70*DPR;
  ctx.drawImage(spriteGold, -coreS/2, -10*DPR-coreS/2, coreS, coreS);
  ctx.globalCompositeOperation = 'source-over';
  ctx.beginPath();
  ctx.fillStyle = 'rgba(6,2,4,0.95)';
  ctx.arc(0,-10*DPR,7*DPR,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  /* particle heart */
  ctx.globalCompositeOperation = 'lighter';
  heartPulse += 0.014;
  const pulse = 1+Math.sin(heartPulse)*0.03;
  const hScale = unit*0.6*pulse;
  const hx = cx, hy = cy - 128*DPR;

  ctx.save();
  ctx.translate(hx, hy);
  for(const p of heartParticles){
    const flick = 0.5+0.5*Math.sin(time*0.0018*p.speed+p.tw);
    const x = p.bx*hScale + p.jx*DPR*0.4;
    const y = p.by*hScale + p.jy*DPR*0.4;
    const s = p.size*DPR*(0.7+flick*0.6);
    ctx.globalAlpha = 0.4+0.55*flick;
    ctx.drawImage(spriteRose, x-s/2, y-s/2, s, s);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(draw);
}

document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden) last = 0;
});

resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
